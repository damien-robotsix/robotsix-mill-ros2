# vcstool manifest (https://github.com/dirk-thomas/vcstool)
#
# Each entry under `repositories:` is keyed by the destination path
# *relative to the directory vcs imports into* (here: `src/`). The
# `type`, `url`, and `version` (branch/tag/commit) fields tell vcstool
# what to clone and which ref to check out.
#
# Add more repositories by listing additional entries under
# `repositories:` following the same schema.
repositories:
  ros2/example_interfaces:
    type: git
    url: https://github.com/damien-robotsix/example_interfaces
    version: lyrical
