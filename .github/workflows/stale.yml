---
# Automatically close stale issues and pull requests.
# Both Navigation2 and MoveIt2 use a similar workflow.
name: Stale

on:
  schedule:
    - cron: "30 1 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639  # v9.1.0
        with:
          stale-issue-message: >-
            This issue has been automatically marked as stale because it
            has not had recent activity. It will be closed in 14 days if
            no further activity occurs. Thank you for your contribution.
          stale-pr-message: >-
            This pull request has been automatically marked as stale
            because it has not had recent activity. It will be closed in
            14 days if no further activity occurs. Thank you for your
            contribution.
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: bug,enhancement,help wanted
          exempt-pr-labels: ""
          stale-issue-label: stale
          stale-pr-label: stale
          repo-token: ${{ secrets.GITHUB_TOKEN }}
